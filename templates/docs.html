<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Lookup API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; background: #0f0f13; }
    .topbar { display: none; }
    .swagger-ui { max-width: 960px; margin: 0 auto; }
    .swagger-ui .info .title { color: #f5f5f7; }
    .swagger-ui .info p, .swagger-ui .info li, .swagger-ui .info .base-url {
      color: #9ca3af;
    }
    .swagger-ui .opblock-tag { color: #f5f5f7 !important; }
    .swagger-ui, .swagger-ui section.models { background: #0f0f13; }
    .swagger-ui .scheme-container { background: #1a1a22; box-shadow: none; }
    .nav-link {
      display: inline-block;
      margin: 16px 0 0 16px;
      color: #25f4ee;
      text-decoration: none;
      font-family: Inter, system-ui, sans-serif;
      font-size: 0.9rem;
    }
    .nav-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="nav-link" href="/">&larr; Back to app</a>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: "/openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis],
    });
  </script>
</body>
</html>
