services:
  app:
    build: .
    env_file:
      - .env
    environment:
      PORT: 5001
      WEB_CONCURRENCY: 2
      GUNICORN_TIMEOUT: 120
    expose:
      - "5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/openapi.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
